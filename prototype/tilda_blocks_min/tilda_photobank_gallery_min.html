erySelector('.fxb-lb-close').addEventListener('click',closeLb); lb.querySelector('.fxb-lb-bg').addEventListener('click',closeLb); lb.querySelector('.fxb-lb-prev').addEventListener('click',function(){if(imgs.length){cur=(cur-1+imgs.length)%imgs.length;lbImg.src=imgs[cur]}}); lb.querySelector('.fxb-lb-next').addEventListener('click',function(){if(imgs.length){cur=(cur+1)%imgs.length;lbImg.src=imgs[cur]}}); })();</script>
