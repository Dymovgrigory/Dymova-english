<style>
  #fxb-topbar{--purple:#2e1a47;--purple-2:#662d92;--orange:#ee7349;--yellow:#fcf951;
    font-family:'Montserrat',Arial,sans-serif;background:linear-gradient(90deg,#2e1a47,#3d2358);color:#fff;-webkit-font-smoothing:antialiased}
  #fxb-topbar *{box-sizing:border-box;margin:0;padding:0}
  #fxb-topbar .fxb-wrap{max-width:1200px;margin:0 auto;padding:10px 22px;display:flex;align-items:center;gap:18px;flex-wrap:wrap;justify-content:center}
  #fxb-topbar .fxb-badge{background:#fff;border-radius:10px;padding:3px 8px;display:flex;align-items:center;line-height:0;box-shadow:0 6px 16px -8px rgba(0,0,0,.5)}
  #fxb-topbar .fxb-badge iframe{display:block;border-radius:6px}
  #fxb-topbar .fxb-branches{display:flex;gap:10px 26px;flex-wrap:wrap;align-items:center;margin-left:auto}
  #fxb-topbar .fxb-branch{display:flex;align-items:center;gap:14px}
  #fxb-topbar .fxb-addr{display:inline-flex;align-items:center;gap:7px;color:#efe7fb;text-decoration:none;font-weight:600;font-size:13.5px;transition:color .2s}
  #fxb-topbar .fxb-addr:hover{color:var(--yellow)}
  #fxb-topbar .fxb-addr svg{width:16px;height:16px;fill:none;stroke:var(--yellow);stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex:0 0 auto}
  #fxb-topbar .fxb-phone-wrap{position:relative}
  #fxb-topbar .fxb-phone{cursor:pointer;border:0;font-family:inherit;display:inline-flex;align-items:center;gap:7px;font-weight:800;font-size:13.5px;color:#fff;background:rgba(255,255,255,.10);padding:7px 13px;border-radius:100px;transition:background .2s}
  #fxb-topbar .fxb-phone:hover{background:rgba(255,255,255,.20)}
  #fxb-topbar .fxb-phone svg{width:14px;height:14px;fill:#fff;stroke:none;flex:0 0 auto}
  #fxb-topbar .fxb-pop{position:absolute;top:calc(100% + 8px);right:0;background:#fff;border-radius:14px;padding:7px;box-shadow:0 20px 44px -14px rgba(0,0,0,.5);display:none;flex-direction:column;gap:3px;min-width:190px;z-index:50}
  #fxb-topbar .fxb-pop.fxb-open{display:flex;animation:fxbfade .25s ease}
  @keyframes fxbfade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  #fxb-topbar .fxb-pop a{display:flex;align-items:center;gap:10px;color:#241a36;text-decoration:none;font-weight:700;font-size:13.5px;padding:10px 12px;border-radius:9px;transition:background .15s}
  #fxb-topbar .fxb-pop a:hover{background:#f4f1fa}
  #fxb-topbar .fxb-pi{width:26px;height:26px;border-radius:8px;display:grid;place-items:center;font-size:13px}
  #fxb-topbar .fxb-call{background:rgba(102,45,146,.12)}
  #fxb-topbar .fxb-max{background:rgba(238,115,73,.14)}
  #fxb-topbar .fxb-maxbot{display:inline-flex;align-items:center;gap:10px;text-decoration:none;color:#fff;background:linear-gradient(135deg,var(--orange),#f5a06f);padding:7px 14px 7px 9px;border-radius:100px;font-weight:800;transition:transform .25s,box-shadow .25s;box-shadow:0 10px 22px -10px rgba(238,115,73,.8)}
  #fxb-topbar .fxb-maxbot:hover{transform:translateY(-2px);box-shadow:0 14px 26px -10px rgba(238,115,73,.9)}
  #fxb-topbar .fxb-maxbot-ic{width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,.22);display:grid;place-items:center}
  #fxb-topbar .fxb-maxbot-ic svg{width:17px;height:17px;fill:none;stroke:#fff;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  #fxb-topbar .fxb-maxbot-tx{display:flex;flex-direction:column;line-height:1.05;font-size:14px}
  #fxb-topbar .fxb-maxbot-tx small{font-weight:600;font-size:10.5px;opacity:.9}
  @media(max-width:760px){#fxb-topbar .fxb-branches{margin:0;justify-content:center}#fxb-topbar .fxb-wrap{gap:12px}}
</style>

<script>
(function(){
  var root=document.getElementById('fxb-topbar');if(!root)return;
  var pops=root.querySelectorAll('.fxb-phone-wrap');
  root.querySelectorAll('.fxb-phone').forEach(function(btn){
    btn.addEventListener('click',function(e){e.stopPropagation();
      var pop=btn.parentNode.querySelector('.fxb-pop');var was=pop.classList.contains('fxb-open');
      root.querySelectorAll('.fxb-pop').forEach(function(p){p.classList.remove('fxb-open')});
      if(!was)pop.classList.add('fxb-open');
    });
  });
  document.addEventListener('click',function(){root.querySelectorAll('.fxb-pop').forEach(function(p){p.classList.remove('fxb-open')})});
})();
</script>
