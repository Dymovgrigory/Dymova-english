<style>
#fxb-contacts{--purple:#392852;--purple-2:#662d92;--orange:#ee7349;
  font-family:'Montserrat',Arial,sans-serif;-webkit-font-smoothing:antialiased;
  background:#fff;padding:64px 24px}
#fxb-contacts *{box-sizing:border-box;margin:0;padding:0}
#fxb-contacts .fxb-section{max-width:1200px;margin:0 auto}
#fxb-contacts .fxb-ct-title{text-align:center;font-size:clamp(22px,3vw,32px);font-weight:900;color:var(--purple);margin-bottom:8px}
#fxb-contacts .fxb-ct-sub{text-align:center;font-size:14px;color:#7a6d90;font-weight:500;margin-bottom:40px}
#fxb-contacts .fxb-ct-grid{display:grid;grid-template-columns:1fr 380px;gap:32px;align-items:stretch}
#fxb-contacts .fxb-ct-map{min-height:400px;border-radius:16px;overflow:hidden;box-shadow:0 8px 30px -10px rgba(57,40,82,.15);border:1px solid rgba(102,45,146,.06)}
#fxb-contacts .fxb-ct-map iframe{width:100%;height:100%;min-height:400px}
#fxb-contacts .fxb-ct-info{display:flex;flex-direction:column;gap:24px}
#fxb-contacts .fxb-ct-branch{background:#faf8fd;border-radius:16px;padding:24px;border:1px solid rgba(102,45,146,.06)}
#fxb-contacts .fxb-ct-branch h3{font-size:16px;font-weight:800;color:var(--purple);margin-bottom:12px}
#fxb-contacts .fxb-ct-addr{display:flex;align-items:flex-start;gap:8px;text-decoration:none;color:#5a4d6e;font-weight:600;font-size:13.5px;margin-bottom:8px;transition:color .2s}
#fxb-contacts .fxb-ct-addr:hover{color:var(--purple-2)}
#fxb-contacts .fxb-ct-addr svg{stroke:var(--purple-2);flex:0 0 auto;margin-top:1px}
#fxb-contacts .fxb-ct-phone{display:inline-flex;align-items:center;gap:8px;text-decoration:none;color:var(--purple);font-weight:800;font-size:15px;transition:color .2s}
#fxb-contacts .fxb-ct-phone:hover{color:var(--orange)}
#fxb-contacts .fxb-ct-phone svg{stroke:var(--orange);flex:0 0 auto}
#fxb-contacts .fxb-ct-general{display:flex;flex-direction:column;gap:10px}
#fxb-contacts .fxb-ct-row{display:flex;align-items:center;gap:10px;font-size:13.5px;color:#5a4d6e;font-weight:600}
#fxb-contacts .fxb-ct-row svg{stroke:var(--purple-2);flex:0 0 auto}
#fxb-contacts .fxb-ct-row a{color:var(--purple-2);text-decoration:none}
#fxb-contacts .fxb-ct-row a:hover{text-decoration:underline}
#fxb-contacts .fxb-ct-social{padding-top:8px}
#fxb-contacts .fxb-social-label{display:block;font-size:12px;font-weight:700;color:#b5afc4;text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px}
#fxb-contacts .fxb-social-links{display:flex;gap:8px}
#fxb-contacts .fxb-social-btn{width:42px;height:42px;border-radius:12px;background:rgba(102,45,146,.06);color:var(--purple-2);display:grid;place-items:center;text-decoration:none;transition:all .2s}
#fxb-contacts .fxb-social-btn:hover{background:var(--purple-2);color:#fff;transform:translateY(-2px);box-shadow:0 6px 16px -6px rgba(102,45,146,.4)}
@media(max-width:860px){
  #fxb-contacts .fxb-ct-grid{grid-template-columns:1fr}
  #fxb-contacts .fxb-ct-map{min-height:300px}
}
</style>
