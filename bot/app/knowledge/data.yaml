company:
  name: "Фоксинбург (Foxy Fox)"
  legal_name: "ИП Дымова Вероника Юрьевна"
  slogan: "Английский не для школы, а для жизни!"
  city: "Долгопрудный"
  description: >
    Языковая школа в Долгопрудном для детей от 2 до 18 лет и взрослых.
    Обучаем английскому, немецкому и китайскому языкам в мини-группах
    до 7 человек с полным погружением в язык.
  philosophy: >
    Живая языковая среда без перехода на русский, индивидуальный подход
    к каждому ученику, обучение «для жизни», а не для оценки.
  methodology: >
    Игровая методика, метод фониксов (Phonics) для чтения, TPR (полное
    физическое реагирование), развитие всех четырёх навыков: говорение,
    аудирование, чтение и письмо. Педагоги развиваются в темпе «три года
    за один».
  work_hours: "Ежедневно с 9:00 до 21:00"
  website: "https://dymova-english.ru"

