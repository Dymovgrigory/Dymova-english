faq:
  - q: "Я не уверена, понравится ли моему ребёнку?"
    a: "Приглашаем на бесплатную диагностику, где ребёнок познакомится с педагогом и атмосферой. Также можно записаться на пробный урок (1 125 ₽) на обычных курсах. Более 90% детей после пробного урока хотят продолжить."
  - q: "Мой ребёнок даже букв не знает. Как он будет заниматься, если всё на английском?"
    a: "Мы работаем с нулевого уровня. Педагоги используют игровую методику, TPR и визуальные материалы — ребёнок начинает понимать и говорить естественно, как осваивал родной язык."
  - q: "Ваша программа совпадает со школьной? Ребёнок не запутается?"
    a: "Наша программа дополняет школьную и идёт глубже. Мы развиваем все четыре навыка, поэтому дети чувствуют себя увереннее и в школе."
  - q: "По каким учебникам вы занимаетесь по английскому?"
    a: "Английский для детей идёт по современным оригинальным УМК My Level (с 1 по 4 уровень) — учебник подбираем по возрасту и подготовке ребёнка. My Level 1 (6–8 лет, Pre-A1), My Level 2 (8–9 лет, Pre-A1→A1), My Level 3 (9–10 лет, A1), My Level 4 (10–11 лет, A1→A2, мягкая подготовка к Кембриджским экзаменам YLE). Комплекты приобретаются в нашей школе. Для ребёнка 9 лет это обычно My Level 2 или 3 — точный уровень определим на бесплатной диагностике."
  - q: "Какие курсы есть в школе?"
    a: >
      У нас есть курсы по трём языкам:

      • Английский язык — основные группы для детей от 2 до 18 лет и взрослых
      (от 8 200 ₽/мес): https://dymova-english.ru/mladshie-shkolniki

      • Курс по чтению Learn to Read — интенсив для 2-3 класса, метод фониксов
      (12 400 ₽): https://dymova-english.ru/reading

      • Курс по школьной грамматике — для 9-17 лет по учебникам Spotlight
      (16 000 ₽): https://dymova-english.ru/grammar

      • Немецкий язык — с преподавателем Саляховой Алиной
      (9 000 ₽/мес): https://dymova-english.ru/nemeckij

      • Китайский язык — с преподавателем Шевченко Дарьей
      (9 000 ₽/мес): https://dymova-english.ru/kitajskij

      • Летняя Академия — дневная программа для 7-12 лет
      (46 000 ₽ за смену): https://dymova-english.ru

      Также есть программы для дошкольников (3-6 лет) и подростков (11-16 лет).
      Подробнее: https://dymova-english.ru/doshkolniki и https://dymova-english.ru/podrostki
  - q: "Какие ваши преимущества?"
    a: >
      Наши сильные стороны:

      • работаем официально по образовательной лицензии;

      • мини-группы до 7 человек;

      • живая языковая среда без перехода на русский;

      • еженедельные видео-отчёты и обратная связь;

      • интерактивное мобильное приложение для домашних заданий;

      • аккредитованный центр Hippo.
  - q: "В какую группу попадет мой ребенок?"
    a: >
      Подберём группу по возрасту и уровню ребёнка после короткой диагностики. Обычно ориентируемся так:

      • 3–6 лет — дошкольники;

      • 7–10 лет — младшие школьники;

      • 11–16 лет — подростки.

      Напишите возраст ребёнка — я подскажу подходящую программу точнее.
  - q: "Хочу узнать точную цену"
    a: >
      Базовая цена основных программ — от 8 200 ₽/мес при оплате за учебный год.
      Чтение — 12 400 ₽, грамматика — 16 000 ₽, немецкий и китайский — 9 000 ₽/мес.
      Если скажете возраст ребёнка и формат, я подскажу самый подходящий вариант.
  - q: "Как давно вы работаете?"
    a: "У нас официальная образовательная лицензия, школа работает ежедневно с 9:00 до 21:00. Если хотите, я подберу программу под возраст ребёнка прямо сейчас?"
  - q: "Как проходят занятия?"
    a: "В мини-группах до 7 человек. Каждый урок: разговорная практика, игровые активности, работа с материалами и закрепление через приложение. Длительность 45–60 минут."
  - q: "Сколько раз в неделю проходят занятия?"
    a: "2 раза в неделю по 60 минут. Есть утренние, дневные и вечерние группы."
  - q: "Как оплачиваются занятия?"
    a: "Помесячно или за семестр (со скидкой). Принимаем карты, переводы и материнский капитал (маткапитал). Подробности — у администратора."
  - q: "Можно ли оплатить материнским капиталом?"
    a: "Да! Мы принимаем оплату материнским капиталом (маткапиталом) — как за основные курсы, так и за летнюю академию. Для оформления свяжитесь с администратором, он поможет с документами."
  - q: "Задаёте ли вы домашние задания? Я не знаю языка."
    a: "Домашние задания выполняются через мобильное приложение в игровом формате с подсказками — помощь родителей не требуется."
  - q: "Как я пойму, что у ребёнка есть результат?"
    a: "Еженедельные видео-отчёты, отчёты об уроке, открытые уроки и регулярные тестирования с обратной связью."
  - q: "Как вы обучаете чтению?"
    a: "Методом фониксов (Phonics): ребёнок учится читать через звуки, а не через зубрёжку букв. Дети начинают читать уже через несколько месяцев."

