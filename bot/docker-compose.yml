services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()"]
      interval: 30s
      timeout: 5s
      retries: 3

  telegram-bootstrap:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    depends_on:
      bot:
        condition: service_healthy
    command: ["python", "-m", "app.telegram_bootstrap"]
    restart: "no"

  telegram-poller:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    depends_on:
      bot:
        condition: service_healthy
    command: ["python", "-m", "app.telegram_poller"]
    restart: unless-stopped
    profiles: ["polling"]
